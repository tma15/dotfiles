onboarding = false

[update]
channel = "stable"
version_check = true
manifest_check = true

[terminal]
shell_mode = "auto"
new_cwd = "follow"

[theme]
name = "terminal"

[ui]
sidebar_width = 32
sidebar_min_width = 20
sidebar_max_width = 40
confirm_close = true
prompt_new_tab_name = false
pane_borders = true
pane_gaps = false
show_agent_labels_on_pane_borders = true
agent_panel_sort = "priority"
mouse_scroll_lines = 5

[ui.toast]
delivery = "terminal"
delay_seconds = 2

[ui.toast.clipboard]
enabled = false

[ui.sound]
enabled = false

[advanced]
scrollback_limit_bytes = 20971520

[session]
resume_agents_on_restore = true

[experimental]
pane_history = false
allow_nested = false
kitty_graphics = false
reveal_hidden_cursor_for_cjk_ime = true
cjk_ime_agents = ["codex", "claude", "opencode", "cursor", "copilot"]
cjk_ime_cursor_shape = "steady_block"
switch_ascii_input_source_in_prefix = true

[keys]
prefix = "ctrl+t"

[[keys.command]]
key = "prefix+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer --plugin herdr-file-viewer"

[[keys.command]]
key = "prefix+shift+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer-tab --plugin herdr-file-viewer"
