### Change Prefix key
unbind-key C-b
set-option -g prefix C-t
bind-key C-t send-prefix

set-window-option -g xterm-keys on

### Mouse support
# Allow scrollback with the mouse wheel without entering copy-mode manually.
set-option -g mouse on

### Terminal passthrough
# Let cmux notification escape sequences pass through when tmux is nested
# inside a cmux-managed terminal.
set-option -g allow-passthrough on

### Key mapping
# split pane in the current directory
bind s split-window -vc "#{pane_current_path}"
bind v split-window -hc "#{pane_current_path}"
# new window in the current directory
bind c new-window -c "#{pane_current_path}"
# move pane like vim
bind j select-pane -D
bind k select-pane -U
bind h select-pane -L
bind l select-pane -R
# last window
bind t last-window

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

### Terminal colors
set-option -g default-terminal tmux-256color
set-option -ga terminal-features ',xterm-256color:RGB'
set-option -ga terminal-features ',xterm-ghostty:RGB'
set-option -ga terminal-features ',tmux-256color:RGB'

### Environment
# Keep tmux panes interactive even if the server was started under Codex.
set-environment -gu NO_COLOR
set-environment -gu CODEX_CI

### scroll back like vi
set-option -w -g mode-keys vi
